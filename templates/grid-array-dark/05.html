<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Series — Grid Array Dark 05</title>
    <!-- template-id: 40 preset-bg: #121008 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --phone-w: 4021;
            --phone-h: 8281;
            --phone-l: 3000;
            --phone-t: 860;
            --screen-left: 3.009%;
            --screen-top: 5.579%;
            --screen-width: 92.99%;
            --screen-height: 92.96%;
            --screen-radius: 4.2%;
            --poster-bg: #121008;
        }

        html {
            background: var(--poster-bg);
        }

        body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--poster-bg);
        }

        #colorbg-host {
            position: absolute;
            inset: 0;
            z-index: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
        }

        .poster {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 48px 40px 56px;
            box-sizing: border-box;
            background: transparent;
        }

        .title {
            flex: 0 0 auto;
            max-width: 860px;
            width: 100%;
            text-align: center;
            font-size: 96px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0.02em;
            color: var(--title-color, #f5f5f7);
            margin-top: 128px;
            overflow: hidden;
            text-overflow: ellipsis;
            overflow-wrap: anywhere;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
        }

        .phone-wrap {
            position: relative;
            top: 72px;
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-crop {
            position: relative;
            width: 63.8%;
            max-width: 950px;
            aspect-ratio: var(--phone-w) / var(--phone-h);
            overflow: hidden;
        }

        .phone-crop .frame {
            position: absolute;
            z-index: 2;
            width: calc(100% * 10000 / var(--phone-w));
            height: auto;
            left: calc(-1 * var(--phone-l) / var(--phone-w) * 100%);
            top: calc(-1 * var(--phone-t) / var(--phone-h) * 100%);
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .screen-slot {
            position: absolute;
            z-index: 1;
            left: calc(var(--screen-left));
            top: calc(var(--screen-top) - 54px);
            width: calc(var(--screen-width));
            height: 1296px;
            overflow: hidden;
            background: #0a0a0a;
            border-radius: 60px;
        }

        .screen-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
    </style>
</head>
<body>
    <div id="colorbg-host" aria-hidden="true"></div>
    <div class="poster" id="poster-root">
        <h1 class="title" id="title-text">应用标题</h1>
        <div class="phone-wrap">
            <div class="phone-crop">
                <div class="screen-slot">
                    <img
                        id="target-image"
                        src="/assets/screenshots/default_screenshot.jpg"
                        alt=""
                        crossorigin="anonymous"
                    />
                </div>
                <img
                    class="frame"
                    src="/assets/devices/mate70pro/Mate70-Pro.png"
                    alt=""
                    width="10000"
                    height="10000"
                />
            </div>
        </div>
    </div>

    <script src="/assets/vendor/color4bg/GridArrayBg.min.js"></script>
    <script>
        const PRESET_COLORS = ['#100C06', '#E8A848', '#F0C070', '#D89038', '#F8D8A0', '#A07030'];
        const PRESET_SEED = 7405;
        const DEFAULT_BG = '#121008';

        const params = new URLSearchParams(window.location.search);
        const imageUrl = params.get('image');
        const title = params.get('title') || '应用标题应用标题应用标题应用标题应用标题应用标题';
        const bg = params.get('bg') || DEFAULT_BG;
        const titleColorParam = params.get('titleColor') || params.get('title_color');

        document.getElementById('title-text').textContent = title;
        document.documentElement.style.setProperty('--poster-bg', bg);

        const lightBg = (function () {
            const m = /^#?([0-9a-f]{6})$/i.exec(bg.trim());
            if (!m) return false;
            const n = parseInt(m[1], 16);
            const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
            const y = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return y > 0.72;
        })();

        const root = document.getElementById('poster-root');
        if (titleColorParam) {
            root.style.setProperty('--title-color', decodeURIComponent(titleColorParam));
        } else if (lightBg) {
            root.style.setProperty('--title-color', '#1a1a1e');
        }

        const gridBg = new Color4Bg.GridArrayBg({
            dom: 'colorbg-host',
            colors: PRESET_COLORS,
            seed: PRESET_SEED,
            loop: false
        });
        gridBg.update('borderwidth', 0.026);
        gridBg.update('scale', 104);
        gridBg.update('amplitude', 0.78);

        let imageDone = false;
        window.__BG_TEX_READY__ = false;

        function notifyReady() {
            if (!imageDone || !window.__BG_TEX_READY__) return;
            window.__IMAGE_LOADED__ = true;
            if (window.__onImageLoaded) window.__onImageLoaded();
        }

        requestAnimationFrame(function () {
            requestAnimationFrame(function () {
                setTimeout(function () {
                    window.__BG_TEX_READY__ = true;
                    notifyReady();
                }, 450);
            });
        });

        const imgEl = document.getElementById('target-image');
        imgEl.onload = function () {
            imageDone = true;
            notifyReady();
        };
        imgEl.onerror = function () {
            window.__IMAGE_ERROR__ = true;
            imageDone = true;
            if (window.__onImageError) window.__onImageError();
            notifyReady();
        };
        if (imageUrl) {
            imgEl.src = imageUrl;
        }
        if (imgEl.complete && imgEl.naturalWidth) {
            imageDone = true;
            notifyReady();
        }
    </script>
</body>
</html>
