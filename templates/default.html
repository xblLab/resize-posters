<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Image Template Renderer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .image-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70%;
            overflow: hidden;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .content-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 36px;
            color: rgba(255,255,255,0.9);
            line-height: 1.5;
            text-shadow: 0 1px 10px rgba(0,0,0,0.3);
        }

        .badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(255,255,255,0.95);
            color: #764ba2;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <img id="target-image" src="" alt="Target" crossorigin="anonymous">
        </div>
        <div class="badge">精选</div>
        <div class="content-overlay">
            <div class="title" id="title-text">图片标题</div>
            <div class="subtitle" id="subtitle-text">这里是副标题描述文字</div>
        </div>
    </div>

    <script>
        // 从 URL 参数获取配置
        const params = new URLSearchParams(window.location.search);
        const imageUrl = params.get('image') || '';
        const title = params.get('title') || '图片标题';
        const subtitle = params.get('subtitle') || '这里是副标题描述文字';

        // 应用配置
        if (imageUrl) {
            document.getElementById('target-image').src = imageUrl;
        }
        document.getElementById('title-text').textContent = title;
        document.getElementById('subtitle-text').textContent = subtitle;

        // 图片加载完成后通知父窗口
        document.getElementById('target-image').onload = function() {
            window.__IMAGE_LOADED__ = true;
            if (window.__onImageLoaded) {
                window.__onImageLoaded();
            }
        };

        document.getElementById('target-image').onerror = function() {
            window.__IMAGE_ERROR__ = true;
            if (window.__onImageError) {
                window.__onImageError();
            }
        };
    </script>
</body>
</html>
