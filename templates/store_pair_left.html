<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Store pair — left</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --stage-w: 2160px;
            --stage-h: 1920px;
            --stage-offset: 0px;
            --poster-bg-base: #0a1228;
            /* 机框+截屏：默认值见 store_pair_phone_layout.js 中 STORE_PAIR_PHONE，由 applyStorePairPhoneLayout 注入 */
        }

        html {
            background: var(--poster-bg-base);
        }

        body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--poster-bg-base);
        }

        /* 2160×1920 虚拟舞台；左窗裁 [0,1080) */
        .stage {
            position: absolute;
            left: var(--stage-offset);
            top: 0;
            width: var(--stage-w);
            height: var(--stage-h);
            overflow: visible;
        }

        /* 铺满整舞台的星空 + 深色底，repeat 图案接缝与左右裁切一致 */
        .stage-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-color: var(--poster-bg-base);
            background-image:
                radial-gradient(ellipse 120% 80% at 50% -10%, rgba(35, 55, 110, 0.45) 0%, transparent 55%),
                radial-gradient(1px 1px at 12% 18%, rgba(255, 255, 255, 0.85), transparent),
                radial-gradient(1px 1px at 38% 42%, rgba(255, 255, 255, 0.55), transparent),
                radial-gradient(1.5px 1.5px at 62% 28%, rgba(255, 255, 255, 0.75), transparent),
                radial-gradient(1px 1px at 78% 65%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 91% 12%, rgba(255, 255, 255, 0.65), transparent),
                radial-gradient(1.2px 1.2px at 25% 72%, rgba(255, 255, 255, 0.45), transparent),
                radial-gradient(1px 1px at 55% 88%, rgba(255, 255, 255, 0.55), transparent);
            background-size: auto, 280px 280px, 280px 280px, 280px 280px, 280px 280px, 280px 280px, 280px 280px, 280px 280px, 280px 280px;
            background-repeat: no-repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat, repeat;
        }

        .copy-block {
            position: absolute;
            z-index: 3;
            left: 0;
            top: 0;
            width: 1080px;
            padding: 52px 48px 32px 52px;
            pointer-events: none;
        }

        .title {
            font-family: ui-serif, Georgia, 'Times New Roman', 'Noto Serif SC', serif;
            font-size: 68px;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: 0.01em;
            color: var(--title-color, #f8f8fc);
            text-align: left;
            max-width: 920px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            overflow-wrap: anywhere;
        }

        .subtitle {
            margin-top: 20px;
            font-size: 34px;
            font-weight: 400;
            line-height: 1.35;
            color: var(--subtitle-color, rgba(248, 248, 252, 0.92));
            text-align: left;
            max-width: 920px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            overflow-wrap: anywhere;
        }

        .perspective-wrap {
            position: absolute;
            z-index: 1;
            left: var(--phone-anchor-x, 1080px);
            top: var(--phone-anchor-y, 52%);
            width: 0;
            height: 0;
            perspective: var(--perspective, 2200px);
            perspective-origin: center center;
        }

        .phone-tilt {
            position: absolute;
            left: 0;
            top: 0;
            transform: translate(-50%, -50%) rotateZ(var(--rz, 22deg)) rotateY(var(--ry, -12deg)) rotateX(var(--rx, 6deg));
            transform-style: preserve-3d;
            transform-origin: center center;
        }

        .phone-crop {
            position: relative;
            width: var(--phone-crop-width, 900px);
            aspect-ratio: var(--phone-w, 4021) / var(--phone-h, 8281);
            overflow: hidden;
        }

        .phone-crop .frame {
            position: absolute;
            z-index: 2;
            width: calc(100% * 10000 / var(--phone-w, 4021));
            height: auto;
            left: calc(-1 * var(--phone-l, 3000) / var(--phone-w, 4021) * 100%);
            top: calc(-1 * var(--phone-t, 860) / var(--phone-h, 8281) * 100%);
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .screen-slot {
            position: absolute;
            z-index: 1;
            left: calc(var(--screen-left, 3.009%));
            top: calc(var(--screen-top, 5.579%) - var(--screen-slot-top-adjust, 54px));
            width: calc(var(--screen-width, 92.99%));
            height: var(--screen-slot-height, 1296px);
            overflow: hidden;
            background: #0a0a0a;
            border-radius: 60px;
        }

        .screen-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
    </style>
</head>
<body>
    <div class="stage" id="stage-root">
        <div class="stage-bg" aria-hidden="true"></div>
        <div class="copy-block">
            <h1 class="title" id="title-text">应用标题</h1>
            <p class="subtitle" id="subtitle-text">副标题描述</p>
        </div>
        <div class="perspective-wrap">
            <div class="phone-tilt">
                <div class="phone-crop">
                    <div class="screen-slot">
                        <img
                            id="target-image"
                            src="/assets/screenshots/default_screenshot.jpg"
                            alt=""
                            crossorigin="anonymous"
                        />
                    </div>
                    <img
                        class="frame"
                        src="/assets/devices/mate70pro/Mate70-Pro.png"
                        alt=""
                        width="10000"
                        height="10000"
                    />
                </div>
            </div>
        </div>
    </div>

    <script src="/templates/store_pair_phone_layout.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const imageUrl = params.get('image');
        const title = params.get('title') || '每晚睡得更好';
        const subtitle = params.get('subtitle') || '睡眠故事、白噪音与冥想';
        const bg = params.get('bg');
        const titleColorParam = params.get('titleColor') || params.get('title_color');
        const subtitleColorParam = params.get('subtitleColor') || params.get('subtitle_color');

        applyStorePairPhoneLayout(document.documentElement, storePairPhoneOverridesFromParams(params));

        document.getElementById('title-text').textContent = title;
        document.getElementById('subtitle-text').textContent = subtitle;

        if (bg) {
            document.documentElement.style.setProperty('--poster-bg-base', bg);
        }

        if (titleColorParam) {
            document.documentElement.style.setProperty('--title-color', decodeURIComponent(titleColorParam));
        }
        if (subtitleColorParam) {
            document.documentElement.style.setProperty('--subtitle-color', decodeURIComponent(subtitleColorParam));
        }

        const base = bg || getComputedStyle(document.documentElement).getPropertyValue('--poster-bg-base').trim() || '#0a1228';
        const lightBg = (function () {
            const m = /^#?([0-9a-f]{6})$/i.exec(String(base).trim());
            if (!m) return false;
            const n = parseInt(m[1], 16);
            const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
            const y = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return y > 0.72;
        })();
        if (!titleColorParam) {
            document.documentElement.style.setProperty('--title-color', lightBg ? '#1a1a1e' : '#f8f8fc');
        }
        if (!subtitleColorParam) {
            document.documentElement.style.setProperty('--subtitle-color', lightBg ? 'rgba(26,26,30,0.92)' : 'rgba(248,248,252,0.92)');
        }

        const imgEl = document.getElementById('target-image');
        if (imageUrl) {
            imgEl.src = imageUrl;
        }

        imgEl.onload = function () {
            window.__IMAGE_LOADED__ = true;
            if (window.__onImageLoaded) window.__onImageLoaded();
        };
        imgEl.onerror = function () {
            window.__IMAGE_ERROR__ = true;
            if (window.__onImageError) window.__onImageError();
        };
    </script>
</body>
</html>
